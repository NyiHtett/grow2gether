services:
  frontend:
    build: ./frontend/react-ts
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/react-ts:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    volumes: 
      - ./backend:/app
    ports:
      - "3000:3000" # PORT 3000 maps to container port 3000
    environment:
      - PORT=3000 # defined for gunicorn